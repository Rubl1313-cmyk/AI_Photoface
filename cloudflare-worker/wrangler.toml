name = "ai-image-generator"
main = "worker.js"
compatibility_date = "2024-03-11"

[vars]
# Переменные окружения (если нужны)
# API_KEY = "your-api-key"

# Лимиты для воркера
[limits]
cpu_ms = 50000  # 50 секунд CPU времени

# KV хранилище (если нужно для кэширования)
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"
