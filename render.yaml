services:
  - type: web
    name: ai-photo-studio
    env: python
    plan: free
    region: oregon
    buildCommand: ""
    startCommand: /start.sh
    envVars:
      - key: TG_BOT_TOKEN
        sync: false
      - key: CF_WORKER_URL
        sync: false
      - key: CF_API_KEY
        sync: false
      - key: DAILY_LIMIT
        value: 50
      - key: PORT
        value: 8080
      - key: FACEFUSION_URL
        value: http://localhost:8081
      - key: WEBHOOK_PATH
        value: /webhook
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
